<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignatura - Julio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <article class="card asignatura-card col-11 col-md-4 shadow-sm">
        <div class="card-header-visual"></div> <div class="card-body text-center p-4">
            <h2 class="fw-bold text-dark">Programación Web</h2> <p class="text-muted">Docente: Ing. Aaron Cisneros</p>
            <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
                <span class="badge-item">ING-402</span>
                <span class="badge-item">Gpo1</span>
                <span class="badge-item">Aula E-201</span>
            </div>

            <button class="btn btn-accion-ulsa w-100">
                Ingresar al Aula Virtual
                .badge-item {
    background-color: var(--azul-claro);
    color: var(--azul-ulsa);
    border: 1px solid #bbdefb;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
}

.btn-accion-ulsa {
    background-color: transparent;
    border: 2px solid var(--azul-ulsa);
    color: var(--azul-ulsa);
    border-radius: 8px;
    font-weight: bold;
    padding: 10px;
}

/* Efecto Hover: Requerimiento 1 y 5 */
.asignatura-card:hover {
    box-shadow: 0 10px 25px rgba(26, 35, 126, 0.2) !important;
    transform: translateY(-5px);
}

.btn-accion-ulsa:hover {
    background-color: var(--azul-ulsa);
    color: white;
}
            </button>
        </div>
    </article>

</body>
</html>
